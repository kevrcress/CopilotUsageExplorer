# CI: tests + builds on every push/PR to main.
# Release packaging lives in release.yml (tag-triggered).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Typecheck/tests never launch Electron; skip the ~100 MB binary download.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Version manifests in sync with root
        run: node scripts/sync-version.mjs --check

      - name: Run tests
        run: npm test

      - name: Build web app
        run: npm run build -w apps/web

      - name: Typecheck VS Code extension
        run: npm run typecheck -w apps/vscode-ext

      - name: Typecheck Electron app
        run: npm run typecheck -w apps/electron
